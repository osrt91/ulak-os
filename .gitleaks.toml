# Gitleaks config for Ulak OS v2.1.4+
# Extends default ruleset; adds project-specific allowlist for known non-secrets.
# See: https://github.com/gitleaks/gitleaks
#
# IMPORTANT: this allowlist MUST NOT contain real credential values or real
# infrastructure identifiers. Use abstract patterns only. Real keys / tokens /
# IPs / emails belong in operator-local config that is gitignored.

[extend]
# Use gitleaks' default rules as the base.
useDefault = true

# -----------------------------------------------------------------------------
# Allowlist — documentation paths where secret-looking strings may legitimately
# appear (example values, placeholder env vars, anti-pattern demonstrations).
# -----------------------------------------------------------------------------
[allowlist]
description = "Ulak OS documentation paths where secret-shaped strings are legitimate"

# Paths that are documentation or templates, not live secrets.
paths = [
  '''\.gitleaks\.toml''',
  '''\.gitleaks\.baseline''',
  '''CHANGELOG\.md''',
  '''docs/governance/settings-permissions-governance\.md''',
  '''docs/governance/ai-provider-allowlist\.md''',
  '''docs/examples/.*\.md''',
  '''docs/runtime/rule-packs/.*\.md''',
  '''\.claude/settings\.local\.example\.json''',
  '''reports/current/.*\.md''',
]

# Abstract patterns that should not be flagged anywhere:
# - env var placeholders in .mcp.json and examples
# - trust-tier enumerations like "T1|T2|...|T7"
# - example commit SHAs in docs (c21204b etc.)
regexes = [
  '''\$\{[A-Z_]+\}''',
  '''T1\|T2\|T3\|T4\|T5\|T6\|T7''',
  '''commit [0-9a-f]{7}''',
]

# Stop words / keywords that should never be flagged even in suspicious contexts.
stopwords = [
  "TODO",
  "FIXME",
  "XXX",
  "placeholder",
  "example",
  "redacted",
  "EXAMPLE_TOKEN",
  "YOUR_KEY_HERE",
]
